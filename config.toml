baseURL = "https://github.com/KaterynaDutykh/madamedutykh-visions.git"

copyright = "© Kateryna Dutykh"
defaultContentLanguage = "en"
disableKinds = ["taxonomy"]
enableRobotsTXT = true
languageCode = "en"
timeZone = "Asia/Dubai"
timeout = "120s"
title = "Gallery"

[params]
  defaultTheme = "dark"
  description = "Personal gallery"
  title = "Kateryna Dutykh Gallery"
  [params.author]
    email = "bketrin@gmail.com"
    name = "Kateryna Dutykh"
  [params.socialIcons]
    linkedin = "https://www.linkedin.com/in/kateryna-dutykh"
    instagram = "https://www.instagram.com/kateryna.dutykh/"
    github = "https://github.com/KaterynaDutykh/"
    email = "mailto:bketrin@gmail.com"
    website = "https://katerynadutykh.github.io/madamedutykh/en/"
      
  [params.gallery]
    #boxSpacing = 10
    #targetRowHeight = 288
    #targetRowHeightTolerance = 0.25

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[imaging]
  quality = 75
  resampleFilter = "CatmullRom"
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    includeFields = "ImageDescription|Orientation"

[cascade]
  [cascade.build]
    publishResources = false
    
[menu]
  [[menu.footer]]
    name = "Theme-Gallery"
    url = "https://github.com/nicokaiser/hugo-theme-gallery/"
    weight = 3

[services]
  [services.rss]
    limit = 100
